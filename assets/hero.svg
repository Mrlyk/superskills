<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-context" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polyline points="0,1 10,5 0,9" fill="none" stroke="#7FB08F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#F2EFE8"/>
  <rect x="20" y="20" width="920" height="540" rx="8" fill="none" stroke="#B9B3AB" stroke-width="1.5"/>

  <text x="480" y="66" text-anchor="middle" font-size="30" font-weight="700" fill="#1F1F1C">superskills — Less is more.</text>
  <text x="480" y="96" text-anchor="middle" font-size="15" fill="#7A756E">A minimal coding harness · 4 skills · 3 hooks · ~418 always-on tokens</text>

  <!-- Left: the heavyweight harness, deleted -->
  <g>
    <rect x="60" y="140" width="230" height="230" rx="12" fill="#F6F4EE" stroke="#B9B3AB" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="76" y="166" font-size="15" font-weight="600" fill="#7A756E">Heavyweight harness</text>

    <rect x="78" y="184" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="109" y="199" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">gates</text>
    <rect x="150" y="184" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="181" y="199" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">reviews</text>
    <rect x="222" y="184" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="253" y="199" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">stages</text>

    <rect x="78" y="228" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="109" y="243" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">rituals</text>
    <rect x="150" y="228" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="181" y="243" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">loops</text>
    <rect x="222" y="228" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="253" y="243" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7A756E">queues</text>

    <rect x="78" y="272" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <rect x="150" y="272" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <rect x="222" y="272" width="62" height="30" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>

    <text x="175" y="336" text-anchor="middle" font-size="13" fill="#7A756E">deleted.</text>
    <line x1="70" y1="150" x2="282" y2="360" stroke="#B4AEA6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right: the compounding loop -->
  <g>
    <rect x="360" y="170" width="170" height="60" rx="30" fill="#F8E9E1" stroke="#D88966" stroke-width="1.8"/>
    <text x="445" y="200" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#D88966">Session N</text>
    <text x="445" y="252" text-anchor="middle" font-size="12" fill="#7A756E">clarify → code → test</text>

    <rect x="360" y="330" width="170" height="60" rx="30" fill="#F8E9E1" stroke="#D88966" stroke-width="1.8"/>
    <text x="445" y="360" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#D88966">Session N+1</text>
    <text x="445" y="412" text-anchor="middle" font-size="12" fill="#7A756E">starts already knowing</text>

    <rect x="650" y="230" width="230" height="100" rx="10" fill="#EAF4FB" stroke="#6FA8D6" stroke-width="1.8"/>
    <text x="765" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#2D2B28">.superskills/</text>
    <text x="765" y="286" text-anchor="middle" font-size="13" fill="#2D2B28">conventions.md · learnings/</text>
    <text x="765" y="308" text-anchor="middle" font-size="12" fill="#5F5A54">committed to the repo</text>
  </g>

  <!-- The four skills that remain -->
  <g>
    <rect x="130" y="460" width="150" height="46" rx="23" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="205" y="483" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#2D2B28">clarify</text>
    <text x="205" y="526" text-anchor="middle" font-size="12" fill="#7A756E">ask before coding</text>

    <rect x="330" y="460" width="150" height="46" rx="23" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="405" y="483" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#2D2B28">learn</text>
    <text x="405" y="526" text-anchor="middle" font-size="12" fill="#7A756E">persist corrections &amp; pitfalls</text>

    <rect x="530" y="460" width="150" height="46" rx="23" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="605" y="483" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#2D2B28">test</text>
    <text x="605" y="526" text-anchor="middle" font-size="12" fill="#7A756E">one final test pass</text>

    <rect x="730" y="460" width="150" height="46" rx="23" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="805" y="483" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#2D2B28">discover</text>
    <text x="805" y="526" text-anchor="middle" font-size="12" fill="#7A756E">distill conventions ≤80 lines</text>
  </g>

  <!-- Connectors: hooks are the automation between states -->
  <path d="M 530 200 H 700 V 230" fill="none" stroke="#7FB08F" stroke-width="1.8" marker-end="url(#arrow-context)"/>
  <text x="612" y="186" text-anchor="middle" font-size="13" fill="#5F5A54">Stop hook — persist learnings</text>

  <path d="M 690 330 V 360 H 530" fill="none" stroke="#7FB08F" stroke-width="1.8" marker-end="url(#arrow-context)"/>
  <text x="610" y="378" text-anchor="middle" font-size="13" fill="#5F5A54">SessionStart hook — inject the index</text>

  <path d="M 805 460 V 330" fill="none" stroke="#7FB08F" stroke-width="1.8" marker-end="url(#arrow-context)"/>
</svg>
