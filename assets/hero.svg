<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-hook" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polyline points="0,1 10,5 0,9" fill="none" stroke="#7FB08F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polyline points="0,1 10,5 0,9" fill="none" stroke="#D88966" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#F2EFE8"/>
  <rect x="20" y="20" width="920" height="560" rx="8" fill="none" stroke="#B9B3AB" stroke-width="1.5"/>

  <text x="480" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#1F1F1C">superskills — Less is more.</text>
  <text x="480" y="90" text-anchor="middle" font-size="15" fill="#7A756E">A minimal coding harness · 4 skills · 3 hooks · ~418 always-on tokens</text>

  <!-- Left: the heavyweight harness, deleted -->
  <g>
    <rect x="56" y="132" width="216" height="232" rx="12" fill="#F6F4EE" stroke="#B9B3AB" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="72" y="158" font-size="14" font-weight="600" fill="#7A756E">Heavyweight harness</text>
    <rect x="74" y="176" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="103" y="190" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">gates</text>
    <rect x="140" y="176" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="169" y="190" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">reviews</text>
    <rect x="206" y="176" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="235" y="190" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">stages</text>
    <rect x="74" y="216" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="103" y="230" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">rituals</text>
    <rect x="140" y="216" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="169" y="230" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">loops</text>
    <rect x="206" y="216" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <text x="235" y="230" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#7A756E">queues</text>
    <rect x="74" y="256" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <rect x="140" y="256" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <rect x="206" y="256" width="58" height="28" rx="6" fill="#EFECE6" stroke="#B4AEA6" stroke-width="1.2"/>
    <line x1="66" y1="142" x2="262" y2="356" stroke="#B4AEA6" stroke-width="2" stroke-linecap="round"/>
    <text x="164" y="332" text-anchor="middle" font-size="13" font-style="italic" fill="#7A756E">deleted.</text>
  </g>

  <!-- Right: the compounding, measured loop -->
  <g>
    <!-- Session N -->
    <rect x="350" y="150" width="190" height="58" rx="29" fill="#F8E9E1" stroke="#D88966" stroke-width="1.8"/>
    <text x="445" y="173" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#C9744F">Session N</text>
    <text x="445" y="193" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#7A756E">clarify · code · test</text>

    <!-- verify-before-done: self-loop hook on the session close -->
    <path d="M 487 150 C 487 120 403 120 403 148" fill="none" stroke="#7FB08F" stroke-width="1.7" marker-end="url(#arrow-hook)"/>
    <text x="445" y="113" text-anchor="middle" font-size="12" fill="#5F5A54">Stop · verify — run it before done</text>

    <!-- Session N+1 -->
    <rect x="350" y="338" width="190" height="58" rx="29" fill="#F8E9E1" stroke="#D88966" stroke-width="1.8"/>
    <text x="445" y="361" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#C9744F">Session N+1</text>
    <text x="445" y="381" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#7A756E">starts already knowing</text>

    <!-- memory in the repo -->
    <rect x="648" y="226" width="244" height="120" rx="10" fill="#EAF4FB" stroke="#6FA8D6" stroke-width="1.8"/>
    <text x="770" y="252" text-anchor="middle" font-size="16" font-weight="700" fill="#2D2B28">.superskills/</text>
    <text x="770" y="276" text-anchor="middle" font-size="12.5" fill="#2D2B28">conventions.md</text>
    <text x="770" y="297" text-anchor="middle" font-size="12.5" fill="#2D2B28">learnings/ — topic wiki</text>
    <text x="770" y="316" text-anchor="middle" font-size="11" fill="#5F5A54">INDEX + topic pages, deduped</text>
    <text x="770" y="335" text-anchor="middle" font-size="11" fill="#5F5A54">committed to the repo</text>

    <!-- Stop · learn: Session N -> memory -->
    <path d="M 540 174 H 770 V 226" fill="none" stroke="#7FB08F" stroke-width="1.8" marker-end="url(#arrow-hook)"/>
    <text x="652" y="165" text-anchor="middle" font-size="12" fill="#5F5A54">Stop · learn ↻ background, as work lands</text>

    <!-- SessionStart: memory -> Session N+1 -->
    <path d="M 770 346 V 367 H 540" fill="none" stroke="#7FB08F" stroke-width="1.8" marker-end="url(#arrow-hook)"/>
    <text x="652" y="385" text-anchor="middle" font-size="12" fill="#5F5A54">SessionStart — inject the index</text>

    <!-- loop-back: N+1 -> N, the compounding cycle -->
    <path d="M 350 367 H 335 V 179 H 350" fill="none" stroke="#D88966" stroke-width="1.7" stroke-dasharray="5 5" marker-end="url(#arrow-loop)"/>
    <text x="324" y="273" text-anchor="middle" font-size="11" fill="#C9744F" transform="rotate(-90 324 273)">compounds</text>
  </g>

  <!-- The four skills that remain -->
  <g>
    <rect x="60" y="430" width="200" height="44" rx="22" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="160" y="452" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#2D2B28">clarify</text>
    <text x="160" y="490" text-anchor="middle" font-size="11.5" fill="#7A756E">ask before coding</text>

    <rect x="280" y="430" width="200" height="44" rx="22" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="380" y="452" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#2D2B28">learn</text>
    <text x="380" y="490" text-anchor="middle" font-size="11.5" fill="#7A756E">merge into the topic wiki</text>

    <rect x="500" y="430" width="200" height="44" rx="22" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="600" y="452" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#2D2B28">test</text>
    <text x="600" y="490" text-anchor="middle" font-size="11.5" fill="#7A756E">one final test pass</text>

    <rect x="720" y="430" width="200" height="44" rx="22" fill="#D7E6DC" stroke="#7FB08F" stroke-width="1.8"/>
    <text x="820" y="452" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#2D2B28">discover</text>
    <text x="820" y="490" text-anchor="middle" font-size="11.5" fill="#7A756E">distill conventions ≤80 lines</text>
  </g>

  <!-- measured footer -->
  <line x1="60" y1="516" x2="900" y2="516" stroke="#D8D2C8" stroke-width="1"/>
  <text x="480" y="538" text-anchor="middle" font-size="12.5" fill="#5F5A54">Every capability is measured A/B against the bare model — memory <tspan font-weight="700" fill="#2D2B28">+80pp</tspan>, test pass <tspan font-weight="700" fill="#2D2B28">+60pp</tspan>, zero regression on HumanEval.</text>
  <text x="480" y="558" text-anchor="middle" font-size="11" fill="#7A756E">full methodology and data in docs/benchmark.md</text>
</svg>
